[tox]
envlist = py312, py313, lint, format, unit, integration, traceloop-integration, compatibility
isolated_build = True
requires = tox>=4.0
# Suppress verbose pip freeze output in CI logs
list_dependencies_command = python -c "print('Dependencies installed.')"

[testenv]
deps =
    pytest>=7.0.0
    pytest-asyncio>=0.21.0
    pytest-cov==7.0.0
    pytest-xdist>=3.0.0
    httpx>=0.24.0
    opentelemetry-api>=1.20.0
    opentelemetry-sdk>=1.20.0
    opentelemetry-exporter-otlp-proto-http>=1.20.0
    wrapt>=1.14.0
    pydantic>=2.0.0
    python-dotenv>=1.0.0
    psutil>=5.9.0

commands =
    # Unit tests WITH coverage (code quality focus) - parallel execution enabled
    pytest tests/unit --asyncio-mode=auto --cov=src/honeyhive --cov-report=term --cov-fail-under=73 -n 4 --dist=worksteal
    # TEMPORARILY DISABLED: tests/tracer tests failing - need update
    # pytest tests/tracer -v --asyncio-mode=auto --cov=src/honeyhive --cov-report=term-missing --cov-append --cov-fail-under=73 -n auto --dist=worksteal
    # TEMPORARILY DISABLED: Integration tests require API credentials
    # pytest tests/integration -v --asyncio-mode=auto --tb=short -n auto --dist=worksteal

setenv =
    PYTHONPATH = {toxinidir}/src
    PYTHONUNBUFFERED = 1
    HH_API_KEY = test-api-key-12345
    # Note: HH_API_URL not set here - unit tests verify default config values
    # HH_PROJECT is deprecated - project derived from API key
    HH_SOURCE = test
    HH_DEBUG_MODE = true
    HH_DISABLE_TRACING = false
    HH_DISABLE_HTTP_TRACING = false
    HH_OTLP_ENABLED = false
    HH_TEST_MODE = true

passenv =
    HH_API_KEY
    HH_PROJECT
    HH_API_URL
    HH_SOURCE
    HH_TEST_MODE
    HH_DEBUG_MODE
    HH_DISABLE_TRACING
    HH_DISABLE_HTTP_TRACING
    HH_OTLP_ENABLED
    HH_OTLP_ENDPOINT
    HH_OTLP_HEADERS
    # LLM Provider API keys for real instrumentor testing
    OPENAI_API_KEY
    ANTHROPIC_API_KEY
    GOOGLE_API_KEY
    GOOGLE_ADK_API_KEY
    AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY
    AWS_SESSION_TOKEN
    AWS_DEFAULT_REGION
    BEDROCK_MODEL_ID
    AZURE_OPENAI_API_KEY
    AZURE_OPENAI_ENDPOINT
    # CI environment indicators
    CI
    GITHUB_ACTIONS
    GITLAB_CI
    JENKINS_URL

[testenv:py311]
description = run full test suite with Python 3.11
basepython = python3.11

[testenv:py312]
description = run full test suite with Python 3.12
basepython = python3.12

[testenv:py313]
description = run full test suite with Python 3.13
basepython = python3.13

[testenv:lint]
description = run linting checks
deps =
    pylint==3.3.8
    mypy==1.17.1
    pytest>=7.0.0
    pytest-asyncio>=0.21.0
    types-python-dateutil>=2.9.0.20240316
    types-requests>=2.31.0
    types-urllib3>=1.26.0
    types-psutil>=5.9.0
    memory-profiler>=0.61.0
    httpx>=0.27.0
    pydantic>=2.10.0
    opentelemetry-api>=1.21.0
    opentelemetry-sdk>=1.21.0
    opentelemetry-exporter-otlp-proto-http>=1.21.0
    opentelemetry-instrumentation>=0.42b0
    wrapt>=1.16.0
    python-dateutil>=2.8.2
    typing-inspect>=0.9.0
    requests>=2.25.1
    dataclasses-json>=0.6.7
    jsonpath-python>=1.0.6
    uplink>=0.1.0
    eval-type-backport>=0.2.0
    psutil>=5.9.0
commands =
    pylint {posargs:src/honeyhive tests} --rcfile=pyproject.toml --ignore-paths=".*\.tox.*"
    mypy {posargs:src/honeyhive} --config-file=pyproject.toml
setenv =
    PYTHONPATH = {toxinidir}/src
passenv = {[testenv]passenv}

[testenv:format]
description = check code formatting
deps =
    ruff>=0.4.0
commands =
    ruff format --check {posargs:src tests}
    ruff check --select I --diff {posargs:src tests}

[testenv:integration]
description = run integration tests with REAL API credentials (NO MOCKS, NO COVERAGE)
deps = 
    {[testenv]deps}
    pytest-xdist>=3.0.0
    # LLM provider dependencies for real instrumentor testing
    openai>=1.0.0
    anthropic>=0.25.0
    google-generativeai>=0.4.0
    boto3>=1.26.0
    openinference-instrumentation-openai
    openinference-instrumentation-anthropic
    openinference-instrumentation-bedrock
commands =
    # Integration tests WITHOUT coverage - focus on real API behavior and system interactions
    # This includes backwards compatibility tests in tests/integration/backwards_compatibility/
    # PARALLEL EXECUTION: Re-enabled after fixing import violations and fixture issues
    # Using loadgroup to honor @pytest.mark.xdist_group for server-side eval test serialization
    pytest tests/integration {posargs:--tb=short} --durations=10 --maxfail=10 -n 12 --dist=loadgroup
setenv =
    PYTHONPATH = {toxinidir}/src
    PYTHONUNBUFFERED = 1
    HH_TEST_MODE = false
    HH_DISABLE_TRACING = false
    HH_DISABLE_HTTP_TRACING = false
    HH_OTLP_ENABLED = true
    HH_TEST_MAX_ATTEMPTS=4      # Default: 10 attempts
    HH_TEST_BASE_DELAY=2.0       # Default: 1.5 seconds
    HH_TEST_MAX_DELAY_CAP=30.0   # Default: 30 seconds max
passenv = 
    {[testenv]passenv}
    HH_API_KEY
    HH_PROJECT
    HH_API_URL
    HH_SOURCE

[testenv:unit]
description = run unit tests only (fast, mocked)
deps = 
    {[testenv]deps}
    pytest-xdist>=3.0.0
    coverage==7.10.7
commands =
    # Clean any existing coverage data to prevent conflicts
    python -c "import os, glob; [os.remove(f) for f in glob.glob('.coverage*') if os.path.isfile(f)]"
    # Unit tests WITH coverage and parallel execution - leveraging multi-instance architecture
    pytest tests/unit {posargs} --cov=src/honeyhive --cov-report=term --cov-report=html --cov-fail-under=73 -n 4 --dist=worksteal
    # Generate additional coverage report (pytest-cov 7.0+ automatically combines parallel data)
    coverage report --fail-under=73
setenv =
    PYTHONPATH = {toxinidir}/src
    PYTHONUNBUFFERED = 1
    HH_API_KEY = test-api-key-12345
    # Note: HH_API_URL not set - tests/unit tests verify default config values
    HH_SOURCE = test
    HH_TEST_MODE = true
    HH_DISABLE_TRACING = false
    HH_DISABLE_HTTP_TRACING = false
    HH_OTLP_ENABLED = false
passenv = 
    # Unit tests should be isolated - don't pass through real environment variables
    # Only pass through CI environment indicators for test reporting
    CI
    GITHUB_ACTIONS
    GITLAB_CI
    JENKINS_URL

[testenv:integrations]
description = run provider integration tests (OpenAI, Anthropic, LangChain, etc.)
deps = 
    {[testenv]deps}
    # OpenAI integrations
    openai>=1.0.0
    openinference-instrumentation-openai>=0.1.0
    opentelemetry-instrumentation-openai>=0.46.0
    # Anthropic integrations
    anthropic>=0.17.0
    openinference-instrumentation-anthropic>=0.1.0
    # LangChain/LangGraph integrations
    langchain>=0.2.0
    langchain-openai>=0.1.0
    langgraph>=0.1.0
    openinference-instrumentation-langchain>=0.1.0
    # AWS Strands Agents (native OTel path; no separate instrumentor needed)
    strands-agents>=1.19.0
    boto3>=1.26.0
commands =
    # Run provider integration tests - requires API keys in environment
    pytest tests/integration/test_openai_integration.py tests/integration/test_anthropic_integration.py tests/integration/test_langchain_integration.py tests/integration/test_bedrock_integration.py tests/integration/test_azure_openai_integration.py tests/integration/test_pydantic_ai_integration.py tests/integration/test_dspy_integration.py tests/integration/test_google_adk_integration.py tests/integration/test_semantic_kernel_integration.py tests/integration/test_strands_integration.py tests/integration/test_autogen_integration.py tests/integration/test_openai_agents_integration.py tests/integration/test_claude_agent_sdk_integration.py tests/integration/test_tracing_integration.py tests/integration/test_evaluate_integration.py tests/integration/test_events_fixes_integration.py {posargs} --asyncio-mode=auto --tb=short
setenv =
    PYTHONPATH = {toxinidir}/src
    PYTHONUNBUFFERED = 1
passenv =
    HH_API_KEY
    HH_PROJECT
    HH_API_URL
    OPENAI_API_KEY
    ANTHROPIC_API_KEY
    GOOGLE_API_KEY
    AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY
    AWS_SESSION_TOKEN
    AWS_DEFAULT_REGION
    BEDROCK_MODEL_ID
    AZURE_OPENAI_API_KEY
    AZURE_OPENAI_ENDPOINT
    AZURE_OPENAI_DEPLOYMENT
    CI
    GITHUB_ACTIONS


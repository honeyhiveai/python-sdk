---
# Dependabot configuration for HoneyHive Python SDK
# See https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/
# configuration-options-for-the-dependabot.yml-file
#
# open-pull-requests-limit: 0 disables routine version-bump PRs while leaving
# Dependabot security alerts and security updates active. This repo receives
# security notifications only; dependency versions are managed at the source.

version: 2
updates:
  # Python dependencies — security updates only.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 0
    reviewers:
      - "honeyhiveai/core-team"
    labels:
      - "dependencies"
      - "python"

  # Docker dependencies — security updates only.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 0
    reviewers:
      - "honeyhiveai/core-team"
    labels:
      - "dependencies"
      - "docker"

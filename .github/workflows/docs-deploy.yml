---
name: Deploy Documentation to GitHub Pages

# Builds the auto-generated ProperDocs reference site (driven by
# docs/gen_ref_pages.py + properdocs.yml + mkdocstrings) and deploys it to
# https://honeyhiveai.github.io/python-sdk/. Because the reference is
# generated from docstrings in src/honeyhive/, docstring-only changes ship
# as doc changes through this same workflow — no separate generation step.
#
# --strict is intentionally OFF to match the Makefile: there are pre-existing
# griffe / mkdocstrings warnings in the source whose cleanup is tracked as a
# follow-up. Re-add --strict to the build step here once those warnings are
# resolved so doc rot can't accumulate silently.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/honeyhive/**'
      - 'properdocs.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/docs-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Avoid concurrent deploys stomping on each other; let an in-flight deploy
# finish before starting the next one rather than cancelling it.
concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          enable-cache: true

      - name: Build site
        run: uv run --extra docs properdocs build

      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

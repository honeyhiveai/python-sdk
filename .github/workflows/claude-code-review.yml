# Triggered by:
#   1. Commenting "@claude review" on a PR — runs code review (no risk assessment)
#   2. Automatically when a PR is opened (excludes dependabot PRs) — runs code review
#   3. Commenting "@claude approve" on a PR — runs risk assessment and approves/rejects the PR
name: Claude Code Review

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened]

jobs:
  review:
    if: >
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude review') &&
       !contains(github.event.comment.body, '@claude approve')) ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.user.login != 'dependabot[bot]')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Resolve PR info
        id: pr-info
        uses: actions/github-script@v8
        with:
          script: |
            let prNumber, headRef;

            if (context.eventName === 'issue_comment') {
              prNumber = context.issue.number;
              const pr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });
              headRef = pr.data.head.ref;
            } else {
              prNumber = context.payload.pull_request.number;
              headRef = context.payload.pull_request.head.ref;
            }

            core.setOutput('pr_number', prNumber);
            core.setOutput('head_ref', headRef);

      - name: Check if workflow file is modified
        id: check-workflow
        uses: actions/github-script@v8
        with:
          script: |
            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number(${{ steps.pr-info.outputs.pr_number }})
            });
            const workflowModified = files.data.some(
              f => f.filename === '.github/workflows/claude-code-review.yml'
            );
            core.setOutput('skip', workflowModified ? 'true' : 'false');
            if (workflowModified) {
              core.info('Skipping Claude review — workflow file itself is modified in this PR');
            }

      - name: Checkout repository
        if: steps.check-workflow.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          ref: federated-sdk-release-candidate
          fetch-depth: 1

      - name: Run Claude Code Review
        if: steps.check-workflow.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude review"
          track_progress: true
          allowed_bots: "devin-ai-integration"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ steps.pr-info.outputs.pr_number }}

            You are reviewing a Python SDK published to PyPI. Review the PR changes with
            meticulous attention to detail. Focus on:

            - **Backwards compatibility**: This is a published SDK. Flag any breaking changes
              to public APIs (function signatures, class interfaces, default values).
            - **Type safety**: All functions must have type hints. Flag any missing annotations.
            - **Graceful degradation**: The SDK must never crash the host application. Flag any
              unhandled exceptions that could propagate to user code.
            - **Python best practices**: Black formatting (line length 88), isort import ordering,
              no code in `__init__.py` files (only imports).
            - **Security**: Check for leaked secrets, unsafe deserialization, or injection risks.
            - **Generated code**: Files under `src/honeyhive/models/` and `src/honeyhive/api/`
              are auto-generated via `make generate`. Don't nitpick style in those files — only
              flag functional issues.
            - **Documentation impact**: If the PR changes public APIs, adds new features, modifies
              behavior, or changes configuration options, flag whether `docs/` (Sphinx docs under
              `docs/how-to/`, `docs/tutorials/`, `docs/reference/`, `docs/explanation/`) or
              `examples/` need corresponding updates. Include a "Documentation" section in the
              top-level PR comment listing any suggested doc updates.

            NOTE: the default branch of this repository is `federated-sdk-release-candidate`.

            ## How to post feedback

            Use inline comments for specific code feedback (bugs, suggestions, nits, etc):
              - Use `mcp__github_inline_comment__create_inline_comment` to leave feedback on specific lines of code.

            Use a single top-level comment for high-level observations about the PR as a whole:
              - Use `gh pr comment` for this.
              - This comment should cover things like overall design, architecture, what looks good, and any general concerns.
              - Do NOT repeat or summarize individual code-level feedback here. That feedback already exists as inline comments and duplicating it adds noise.

            Only post GitHub comments - don't submit review text as messages.
          claude_args: |
            --model claude-opus-4-6 --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),WebFetch,WebSearch"

      - name: Upload review execution output
        if: always() && steps.check-workflow.outputs.skip != 'true'
        uses: actions/upload-artifact@v6
        with:
          name: claude-review-output
          path: /home/runner/work/_temp/claude-execution-output.json
          if-no-files-found: warn

  request-approval:
    if: >
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude approve')
    runs-on: ubuntu-latest
    permissions:
      contents: read  # clone repo
      actions: read   # read CI output
      issues: write   # write comments on PRs
      pull-requests: write # read PR head ref + post reviews
      id-token: write # get OIDC token
    steps:
      - name: Resolve PR info
        id: pr-info
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = context.issue.number;
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            core.setOutput('pr_number', prNumber);
            core.setOutput('head_ref', pr.data.head.ref);

      - name: Check if workflow file is modified
        id: check-workflow
        uses: actions/github-script@v8
        with:
          script: |
            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number(${{ steps.pr-info.outputs.pr_number }})
            });
            const workflowModified = files.data.some(
              f => f.filename === '.github/workflows/claude-code-review.yml'
            );
            core.setOutput('skip', workflowModified ? 'true' : 'false');
            if (workflowModified) {
              core.info('Skipping Claude approve — workflow file itself is modified in this PR');
            }

      - name: Checkout repository
        if: steps.check-workflow.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          ref: federated-sdk-release-candidate
          fetch-depth: 1

      - name: Run Claude Approve
        if: steps.check-workflow.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude approve"
          track_progress: true
          allowed_bots: "devin-ai-integration"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ steps.pr-info.outputs.pr_number }}

            You are performing the final review before approving this PR.
            Do a final check of the PR changes.

            Your approval is advisory — a human reviewer can always merge regardless. Be direct and honest in your assessment.

            NOTE: the default branch of this repository is `federated-sdk-release-candidate`.

            ## Steps

            1. Review the full diff one more time.
            2. Check CI status using `gh pr checks`. If any required checks are failing, do NOT approve. Post a comment listing the failing checks and stop.
            3a. For every unresolved comment, if the feedback has been addressed correctly, resolve the comment.
            3b. If it has not been addressed, or addressed incorrectly, reply to the comment saying that it has not been addressed.
            4a. Perform the risk assessment (see below).
            4b. Post your risk assessment as a top-level PR comment using `gh pr comment`.
            5a. If the risk is Low, post a top-level PR comment using `gh pr comment` that starts with **APPROVED** followed by the reason.
            5b. If the risk is not Low, post a top-level PR comment using `gh pr comment` that starts with **NOT APPROVED** followed by the reason.

            ## Risk assessment

            Evaluate two axes separately. The overall rating is the higher of the two.

            **Regression Risk**
            Will this break something that currently works?
            Factors: test coverage of changed code paths, blast radius (shared vs leaf code), sensitive areas (auth, infra, config, CI/CD), reversibility.

            **Design Quality Risk**
            Is the new code well-structured and complete?
            Factors: all review comments resolved, appropriate abstractions, edge cases handled, no obvious gaps in logic.

            **Combined Rating**

            - 🟢 **Low** — New behavior is tested, no unresolved comments, and shared/sensitive code paths are covered. Design feedback has been addressed and the implementation is sound.
            - 🟡 **Medium** — Test coverage exists but has gaps in non-critical paths, OR minor design feedback remains unresolved. No sensitive areas affected.
            - 🟠 **High** — Sensitive areas or shared code touched with incomplete test coverage, OR substantive design concerns (wrong abstraction, unhandled edge cases) remain unresolved.
            - 🔴 **Critical** — Missing tests on new behavior in sensitive or high-blast-radius code, OR fundamental design issues (architectural mismatch, broken contracts). Multiple unresolved concerns.

            Only 🟢 Low is approved. All other ratings require changes.
          claude_args: |
            --model claude-opus-4-6 --allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr checks:*),WebFetch,WebSearch"

      - name: Upload approve execution output
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: claude-approve-output
          path: /home/runner/work/_temp/claude-execution-output.json
          if-no-files-found: warn

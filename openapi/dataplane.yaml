    MetricVersionContentRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        type:
          type: string
          enum:
            - PYTHON
            - LLM
            - HUMAN
            - COMPOSITE
        criteria:
          type: string
          minLength: 1
        description:
          type: string
          default: ''
          description: Free-form description of the metric. Defaults to an empty string.
        return_type:
          type: string
          enum:
            - float
            - boolean
            - string
            - categorical
          default: float
          description: Return type of the metric. Defaults to `float`.
        enabled_in_prod:
          type: boolean
          default: false
          description: Whether this version should run against production traffic. Defaults to `false` for non-HUMAN metrics and `true` for HUMAN metrics.
        needs_ground_truth:
          type: boolean
          default: false
          description: Whether this metric requires ground-truth labels to evaluate. Defaults to `false`.
        sampling_percentage:
          type: number
          minimum: 0
          maximum: 100
          default: 10
          description: Percentage of events the metric should run against, 0–100. Defaults to `10`.
        model_provider:
          type:
            - string
            - 'null'
        model_name:
          type:
            - string
            - 'null'
        scale:
          type:
            - integer
            - 'null'
          exclusiveMinimum: 0
        threshold:
          type:
            - object
            - 'null'
          properties:
            min:
              type: number
            max:
              type: number
            pass_when:
              anyOf:
                - type: boolean
                - type: number
            passing_categories:
              type: array
              items:
                type: string
                maxLength: 200
              minItems: 1
          additionalProperties: false
        categories:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/MetricVersionContentRequestCategoriesItem'
          minItems: 1
        child_metrics:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/MetricVersionContentRequestChildMetricsItem'
          minItems: 1
        filters:
          $ref: '#/components/schemas/MetricVersionContentRequestFilters'
      required:
        - name
        - type
        - criteria
      additionalProperties: false
      description: |-
        Metric definition snapshot accepted by POST /v1/metrics/{metric_id}/versions.
        Six fields are optional and fall back to server-side defaults when omitted:
        - `description` → `""`
        - `return_type` → `"float"`
        - `enabled_in_prod` → `true` for HUMAN metrics, `false` otherwise
        - `needs_ground_truth` → `false`
        - `sampling_percentage` → `10`
        - `filters` → `{ "filterArray": [] }`

openapi: 3.1.0
info:
  title: HoneyHive Data Plane API
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  version: 1.2.1
servers:
  - url: https://api.honeyhive.ai
tags:
  - name: Charts
    description: |
      Define and manage saved charts. Charts are visualizations that aggregate metrics over time with bucketing, filters, and groupings.
  - name: Configurations
    description: |
      Manage prompt configurations, i.e. model parameters, message templates, and response settings that can be versioned and deployed without code changes.
  - name: Datapoints
    description: |
      Manage individual records inside datasets, including batch creation and mapping to source events.
  - name: Datasets
    description: |
      Curate collections of datapoints used as test sets for evaluations and experiments.
  - name: Events
    description: |
      Read and write trace events. Events are the spans that capture every step of an AI application's execution.
  - name: Experiments
    description: |
      Run, retrieve, and compare evaluation runs to measure how prompt or configuration changes affect agent performance.
  - name: Metric Versions
    description: |
      Snapshot, list, and deploy versions of a metric's definition so changes can be reviewed and rolled back without losing history.
  - name: Metrics
    description: |
      Define and run evaluators, i.e. automated quality checks that score traces against criteria like accuracy, safety, or correctness.
  - name: Queues
    description: |
      Manage annotation queues for human review of traces, turning expert feedback into labeled datasets.
  - name: Sessions
    description: |
      Group related trace events into sessions, the top-level container for a multi-step or multi-service AI interaction.
paths:
  /session/start:
    post:
      summary: Start a new session (deprecated)
      operationId: startSessionLegacy
      x-cli-exclude: true
      x-ts-sdk-exclude: true
      deprecated: true
      tags:
        - Sessions
      description: |
        Deprecated. Use `POST /v1/sessions` instead. The legacy route wraps the session object under a `session` key; the v1 route accepts a bare session object.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LegacyStartSessionRequest'
      responses:
        '200':
          description: Session successfully started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostSessionStartResponse'
  /session/{session_id}/traces:
    post:
      summary: Add traces to a session (deprecated)
      operationId: addSessionTracesLegacy
      x-cli-exclude: true
      x-ts-sdk-exclude: true
      deprecated: true
      tags:
        - Sessions
      description: |
        Deprecated. Use `POST /v1/sessions/{session_id}/events/batch` instead. This route accepts trace events under either `logs` (deprecated) or `events`. Exactly one of the two MUST be present in a request: neither → 400, both → 400.
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
          description: Session ID to add traces to
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddSessionTracesRequest'
      responses:
        '200':
          description: Traces added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionTracesResponse'
        '400':
          description: |
            Bad request: both `logs` and `events` supplied, or neither, or invalid event payload.
  /v1/sessions:
    post:
      tags:
        - Sessions
      operationId: createSession
      x-cli-name: create
      x-ts-sdk-name: create
      summary: Start a new session
      description: |
        Start a new session. The request body is a bare session object (no
        `session` wrapper). The server creates a session event and returns
        it.

        **No required properties.** Every field has a server-side fallback.

        **Auto-generated properties** (provided by the server when omitted):

        - `session_id` (string, UUID): Server generates a UUIDv4 if omitted
          or if the supplied value is not a valid UUID.

        **Optional properties with defaults:**

        - `event_name` (string): Falls back to `session_name` when not
          provided; defaults to `"unknown"` if both are absent.
        - `source` (string): Defaults to `"unknown"`.

        **Optional properties:**

        - `session_name` (string): Display name for the session.
        - `start_time` (number): Session start time as Unix milliseconds.
          The session normalizer uses `getInt64()` which only accepts numeric
          types; if a string is passed, the server silently falls back to the
          current time.
        - `end_time` (number): Session end time as Unix milliseconds (same
          numeric-only caveat as `start_time`).
        - `duration` (number): Session duration in milliseconds.
        - `config` (object): Configuration associated with the session.
        - `inputs` (object): Input data for the session.
        - `outputs` (object): Output data from the session.
        - `metadata` (object): Arbitrary metadata.
        - `user_properties` (object): User properties.
        - `children_ids` (array of strings): IDs of child events.

        Idempotent on `session_id`: posting twice with the same `session_id`
        merges metadata/user_properties into the existing session and returns
        the existing event.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartSessionRequest'
      responses:
        '200':
          description: Session successfully started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostSessionStartResponse'
        '400':
          description: Bad request (invalid session data)
  /v1/sessions/{session_id}/events/batch:
    post:
      tags:
        - Sessions
      operationId: createSessionEventBatch
      x-cli-name: create-event-batch
      x-ts-sdk-name: createEventBatch
      summary: Add a batch of events to a session
      description: |
        Add a batch of events to an existing session. Each event in the batch
        is stored with `session_id` set from the URL path, overriding any
        `session_id` in the event body.

        Each event must include `event_type` (one of `chain`, `model`, `tool`,
        `session`) and `inputs`. Unknown top-level fields and unknown per-event
        fields are rejected. Events are processed sequentially. For
        higher-throughput ingestion across sessions, use
        `POST /v1/events/batch` instead.
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Session ID to add events to
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionEventBatchRequest'
      responses:
        '200':
          description: Events added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionTracesResponse'
              example:
                success: true
        '400':
          description: Bad request (invalid event data or missing required fields)
        '500':
          description: Events partially added
  /events:
    post:
      tags:
        - Events
      operationId: createEventLegacy
      x-cli-exclude: true
      x-ts-sdk-exclude: true
      deprecated: true
      summary: Create a new event (deprecated)
      description: |
        Deprecated. Use `POST /v1/events` instead. The legacy route wraps the event object under an `event` key; the v1 route accepts a bare event object.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LegacyPostEventRequest'
      responses:
        '200':
          description: Event created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostEventResponse'
              example:
                event_id: 7f22137a-6911-4ed3-bc36-110f1dde6b66
                success: true
        '400':
          description: Bad request (invalid event data or missing required fields)
    put:
      tags:
        - Events
      operationId: updateEventLegacy
      x-cli-exclude: true
      x-ts-sdk-exclude: true
      deprecated: true
      summary: Update an event (deprecated)
      description: |
        Deprecated. Use `PUT /v1/events/{event_id}` instead.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LegacyUpdateEventRequest'
            example:
              event_id: 7f22137a-6911-4ed3-bc36-110f1dde6b66
              metadata:
                cost: 0.00008
                completion_tokens: 23
                prompt_tokens: 35
                total_tokens: 58
              feedback:
                rating: 5
              metrics:
                num_words: 2
              outputs:
                role: assistant
                content: Hello world
              config:
                template:
                  - role: system
                    content: Hello, {{ name }}!
              user_properties:
                user_id: 691b1f94-d38c-4e92-b051-5e03fee9ff86
              duration: 42
      responses:
        '200':
          description: Event updated
        '400':
          description: Bad request
  /v1/events:
    post:
      tags:
        - Events
      operationId: createEvent
      x-cli-name: create
      x-ts-sdk-name: create
      summary: Create a new event
      description: |
        Create a new event (span) within a session trace. The request body is a
        bare event object (no `event` wrapper).


        **Required properties:**

        - `event_type` (string): Must be one of: `chain`, `model`, `tool`, `session`.
        - `inputs` (object): Input data for the event.

        **Auto-generated properties** (provided by the server when omitted):

        - `event_id` (string, UUID): Unique identifier for the event.
        - `session_id` (string, UUID): Session/trace identifier.
        - `parent_id` (string, UUID): Parent event ID. Defaults to `session_id`.

        **Optional properties with defaults:**

        - `event_name` (string): Name of the event. Defaults to `"unknown"`.
        - `source` (string): Source of the event (e.g. `sdk-python`). Defaults to `"unknown"`.

        **Optional properties:**

        - `config` (object): Configuration data (e.g. model parameters, prompt templates).
        - `outputs` (object): Output data from the event.
        - `error` (string or null): Error message if the event failed.
        - `children_ids` (array of strings): IDs of child events.
        - `duration` (number): Duration of the event in milliseconds.
        - `start_time` (number): Unix timestamp in milliseconds for event start.
        - `end_time` (number): Unix timestamp in milliseconds for event end.
        - `metadata` (object): Additional metadata (e.g. token counts, cost).
        - `metrics` (object): Custom metrics.
        - `feedback` (object): Feedback data (e.g. ratings, ground truth).
        - `user_properties` (object): User properties associated with the event.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostEventRequest'
      responses:
        '200':
          description: Event created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostEventResponse'
              example:
                event_id: 7f22137a-6911-4ed3-bc36-110f1dde6b66
                success: true
        '400':
          description: Bad request (invalid event data or missing required fields)
  /v1/events/{event_id}:
    get:
      tags:
        - Events
      operationId: getEvent
      x-cli-name: get
      x-ts-sdk-name: get
      summary: Get an event by ID
      description: |
        Retrieve a single event by its unique identifier. The event is fetched
        directly from S3/MinIO storage.
      parameters:
        - in: path
          name: event_id
          required: true
          schema:
            type: string
            format: uuid
          description: The unique identifier of the event to retrieve
      responses:
        '200':
          description: Event retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetEventResponse'
        '400':
          description: Bad request (invalid event_id)
        '404':
          description: Event not found
    put:
      tags:
        - Events
      operationId: updateEvent
      x-cli-name: update
      x-ts-sdk-name: update
      summary: Update an event
      description: |
        Update fields on an existing event. Only the provided fields are
        modified; omitted fields are left unchanged. Extra fields not listed
        below are accepted by the server but silently ignored.
      parameters:
        - in: path
          name: event_id
          required: true
          schema:
            type: string
            format: uuid
          description: The unique identifier of the event to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEventRequest'
            example:
              metadata:
                cost: 0.00008
                completion_tokens: 23
                prompt_tokens: 35
                total_tokens: 58
              feedback:
                rating: 5
              metrics:
                num_words: 2
              outputs:
                role: assistant
                content: Hello world
              config:
                template:
                  - role: system
                    content: Hello, {{ name }}!
              user_properties:
                user_id: 691b1f94-d38c-4e92-b051-5e03fee9ff86
              duration: 42
      responses:
        '200':
          description: Event updated
        '400':
          description: Bad request
  /v1/events/export:
    post:
      tags:
        - Events
      operationId: exportEventsLegacy
      x-cli-exclude: true
      x-ts-sdk-exclude: true
      deprecated: true
      summary: Retrieve events based on filters (deprecated)
      description: |
        Deprecated. Use `POST /v1/events/search` instead.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LegacyExportEventsRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportEventsResponse'
  /v1/events/search:
    post:
      tags:
        - Events
      operationId: searchEvents
      x-cli-name: search
      x-ts-sdk-name: search
      summary: Retrieve events based on filters
      description: |
        Search events via POST with filtering and pagination. This is the primary method for retrieving events from HoneyHive.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchEventsRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportEventsResponse'
  /v1/events/batch:
    post:
      tags:
        - Events
      operationId: createEventBatch
      x-cli-name: create-batch
      x-ts-sdk-name: createBatch
      summary: Create a batch of events
      description: |
        Create multiple events in a single request. When `single_session` is
        true, all events share the same session created from `session_properties`.


        **Required properties:**

        - `events` (array of event objects): Each event must include
          `event_type` (one of `chain`, `model`, `tool`, `session`) and `inputs`.

        **Optional properties:**

        - `single_session` (boolean): If true, all events share a single session
          created from `session_properties`. Defaults to false.
        - `session_properties` (object): Session metadata used when
          `single_session` is true. May include `session_name`, `start_time`,
          `metadata`.

        Unknown top-level fields and per-event fields are rejected at the SDK
        boundary; the legacy aliases `is_single_session`, `session`, and
        per-event `project` are no longer accepted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostEventBatchRequest'
      responses:
        '200':
          description: Events created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostEventBatchResponse'
              example:
                event_ids:
                  - 7f22137a-6911-4ed3-bc36-110f1dde6b66
                  - 7f22137a-6911-4ed3-bc36-110f1dde6b67
                session_id: caf77ace-3417-4da4-944d-f4a0688f3c23
                success: true
        '400':
          description: Bad request (invalid event data or missing required fields)
        '500':
          description: Events partially created
  /events/model:
    post:
      tags:
        - Events
      operationId: createModelEventLegacy
      x-cli-exclude: true
      x-ts-sdk-exclude: true
      deprecated: true
      summary: Create a new model event (deprecated)
      description: |
        Deprecated. Use `POST /v1/events` with `event_type="model"` instead. The `ModelEvent` schema carries 14 field-level deprecations covering the model-specific fields the generic event route now expresses (`model`, `messages`, `response`, `provider`, `usage`, `cost`, `hyperparameters`, `template`, `template_inputs`, `tools`, `tool_choice`, `response_format`, `duration`, `error`), plus `project` inherited from `LegacyEvent`. The legacy route continues to serve traffic and remaps these fields into `inputs.*` / `outputs.*` before storage.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostModelEventRequest'
      responses:
        '200':
          description: Model event created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostEventResponse'
              example:
                event_id: 7f22137a-6911-4ed3-bc36-110f1dde6b66
                success: true
  /events/batch:
    post:
      tags:
        - Events
      operationId: createEventBatchLegacy
      x-cli-exclude: true
      x-ts-sdk-exclude: true
      deprecated: true
      summary: Create a batch of events (deprecated)
      description: |
        Deprecated. Use `POST /v1/events/batch` instead. The legacy route accepts the deprecated `is_single_session` and `session` aliases and lets per-event objects carry the deprecated `project` field; the v1 route rejects all three at the SDK boundary.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LegacyPostEventBatchRequest'
      responses:
        '200':
          description: Events created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostEventBatchResponse'
              example:
                event_ids:
                  - 7f22137a-6911-4ed3-bc36-110f1dde6b66
                  - 7f22137a-6911-4ed3-bc36-110f1dde6b67
                session_id: caf77ace-3417-4da4-944d-f4a0688f3c23
                success: true
        '500':
          description: Events partially created
  /events/model/batch:
    post:
      tags:
        - Events
      operationId: createModelEventBatchLegacy
      x-cli-exclude: true
      x-ts-sdk-exclude: true
      deprecated: true
      summary: Create a batch of model events (deprecated)
      description: |
        Deprecated. Use `POST /v1/events/batch` with `event_type="model"` on each event instead. Migration notes: the top-level array `model_events` becomes `events`; each element must explicitly set `event_type: "model"` (the legacy route sets this server-side); the deprecated top-level aliases `is_single_session` and `session` are not accepted by the v1 route (`PostEventBatchRequest` is `.strict()`); use `single_session` and `session_properties` instead. The legacy route continues to serve traffic and remaps the model-specific fields on each event (`model`, `messages`, `response`, `provider`, `usage`, `cost`, `hyperparameters`, `template`, `template_inputs`, `tools`, `tool_choice`, `response_format`, `duration`, `error`) into `inputs.*` / `outputs.*` before storage.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostModelEventBatchRequest'
      responses:
        '200':
          description: Model events created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostEventBatchResponse'
              example:
                event_ids:
                  - 7f22137a-6911-4ed3-bc36-110f1dde6b66
                  - 7f22137a-6911-4ed3-bc36-110f1dde6b67
                success: true
        '500':
          description: Model events partially created
  /v1/charts:
    get:
      tags:
        - Charts
      operationId: getCharts
      x-cli-name: list
      x-ts-sdk-name: list
      summary: List charts
      description: Retrieve all charts in the current scope.
      responses:
        '200':
          description: Charts retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetChartsResponse'
    post:
      tags:
        - Charts
      operationId: createChart
      x-cli-name: create
      x-ts-sdk-name: create
      summary: Create a new chart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChartRequest'
      responses:
        '200':
          description: Chart created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateChartResponse'
  /v1/charts/{chart_id}:
    get:
      tags:
        - Charts
      operationId: getChart
      x-cli-name: get
      x-ts-sdk-name: get
      summary: Get a chart
      description: Retrieve a single chart by id.
      parameters:
        - in: path
          name: chart_id
          required: true
          schema:
            type: string
          description: The unique identifier of the chart to retrieve
      responses:
        '200':
          description: Chart retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetChartResponse'
    put:
      tags:
        - Charts
      operationId: updateChart
      x-cli-name: update
      x-ts-sdk-name: update
      summary: Update a chart
      description: Update a chart's editable fields. Only fields included in the request body are modified.
      parameters:
        - in: path
          name: chart_id
          required: true
          schema:
            type: string
          description: The unique identifier of the chart to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateChartRequest'
      responses:
        '200':
          description: Chart updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateChartResponse'
    delete:
      tags:
        - Charts
      operationId: deleteChart
      x-cli-name: delete
      x-ts-sdk-name: delete
      summary: Delete a chart
      parameters:
        - in: path
          name: chart_id
          required: true
          schema:
            type: string
          description: The unique identifier of the chart to delete
      responses:
        '200':
          description: Chart deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteChartResponse'
  /v1/metrics:
    get:
      tags:
        - Metrics
      operationId: getMetrics
      x-cli-name: list
      x-ts-sdk-name: list
      summary: List all metrics
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
          description: Filter by metric type
        - name: id
          in: query
          required: false
          schema:
            type: string
          description: Filter by specific metric ID
      responses:
        '200':
          description: Metrics retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMetricsResponse'
    post:
      tags:
        - Metrics
      operationId: createMetric
      x-cli-name: create
      x-ts-sdk-name: create
      summary: Create a new metric
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMetricRequest'
      responses:
        '200':
          description: Metric created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateMetricResponse'
    put:
      tags:
        - Metrics
      operationId: updateMetricLegacy
      x-cli-exclude: true
      x-ts-sdk-exclude: true
      deprecated: true
      summary: Update an existing metric (deprecated)
      description: Deprecated. Use `PUT /v1/metrics/{metric_id}` instead.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LegacyUpdateMetricRequest'
      responses:
        '200':
          description: Metric updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateMetricResponse'
    delete:
      tags:
        - Metrics
      operationId: deleteMetricLegacy
      x-cli-exclude: true
      x-ts-sdk-exclude: true
      deprecated: true
      summary: Delete a metric (deprecated)
      description: Deprecated. Use `DELETE /v1/metrics/{metric_id}` instead.
      parameters:
        - name: metric_id
          in: query
          required: true
          schema:
            type: string
            description: Unique identifier of the metric
      responses:
        '200':
          description: Metric deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteMetricResponse'
  /v1/metrics/{metric_id}:
    put:
      tags:
        - Metrics
      operationId: updateMetric
      x-cli-name: update
      x-ts-sdk-name: update
      summary: Update an existing metric
      description: Update a metric's editable fields. Only fields included in the request body are modified.
      parameters:
        - in: path
          name: metric_id
          required: true
          schema:
            type: string
          description: The unique identifier of the metric to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMetricRequest'
      responses:
        '200':
          description: Metric updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateMetricResponse'
    delete:
      tags:
        - Metrics
      operationId: deleteMetric
      x-cli-name: delete
      x-ts-sdk-name: delete
      summary: Delete a metric
      parameters:
        - in: path
          name: metric_id
          required: true
          schema:
            type: string
          description: The unique identifier of the metric to delete
      responses:
        '200':
          description: Metric deleted successfully
          content:

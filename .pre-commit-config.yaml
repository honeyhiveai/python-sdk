# Pre-commit hooks for HoneyHive Python SDK
# See https://pre-commit.com for more information
#
# FAST CHECKS ONLY: Only essential, fast checks run on pre-commit
# For comprehensive checks, use: make test-all, make check-docs, make check-integration
---
fail_fast: true  # Stop on first failure
repos:
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.0
    hooks:
      - id: yamllint
        args: [-c=.yamllint]
        files: '^.*\.(yaml|yml)$'

  - repo: local
    hooks:
      # Code Quality Checks (Fast)
      - id: tox-format-check
        name: Code Formatting Check (Black + isort)
        entry: tox -e format
        language: system
        pass_filenames: false
        files: '^(src/.*\.py|tests/.*\.py|examples/.*\.py|scripts/.*\.py)$'
        stages: [pre-commit]

      - id: tox-lint-check
        name: Code Quality Check (Pylint + Mypy)
        entry: tox -e lint
        language: system
        pass_filenames: false
        files: '^(src/.*\.py|tests/.*\.py|examples/.*\.py|scripts/.*\.py)$'
        stages: [pre-commit]

      # Fast Unit Tests Only
      - id: unit-tests
        name: Unit Test Suite (Fast, Mocked)
        entry: tox -e unit
        language: system
        pass_filenames: false
        files: '^(src/.*\.py|tests/unit/.*\.py)$'
        stages: [pre-commit]


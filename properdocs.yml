# MkDocs configuration for the HoneyHive Python SDK reference docs.
#
# This is intentionally minimal: the goal of the MVP is for `make docs-serve`
# to render an API reference site locally from the docstrings in src/honeyhive.
# CI, deployment, and versioning are explicitly out of scope here.
#
# Module pages are auto-generated by docs/gen_ref_pages.py via mkdocs-gen-files,
# which walks src/ and emits one Markdown file per public module. The
# mkdocstrings handler then expands the `:::` directives in those files using
# griffe (AST-based, no imports — see docs/gen_ref_pages.py header comment).

site_name: HoneyHive Python SDK Reference
site_description: Auto-generated API reference for the HoneyHive Python SDK.
docs_dir: docs
site_dir: site                        # already gitignored via /site

# Public source-of-truth for the SDK. Material renders this as a link
# (with star/fork count fetched at build time) in the navbar top-right.
repo_url: https://github.com/honeyhiveai/python-sdk
repo_name: honeyhiveai/python-sdk

# Setting `repo_url` would otherwise auto-derive an `edit_uri` and add an
# "Edit this page" pencil to every page. The reference pages are generated
# by docs/gen_ref_pages.py at build time — there's no source markdown to
# edit. The right fix for any content issue is editing the docstring in
# src/honeyhive, so suppress the link explicitly.
edit_uri: ""

# The gen-files plugin script lives under docs/ for convenience but is not
# documentation content; tell mkdocs not to copy it into the built site.
exclude_docs: |
  gen_ref_pages.py

# Theme: mkdocs-material. Material is required for `signature_crossrefs`
# to work — the built-in mkdocs/readthedocs themes use highlight.js which
# re-tokenizes signature code blocks client-side and wipes the autoref
# <a> tags that mkdocstrings injects. Material uses Pygments only.
theme:
  name: material

  # Brand logo shown in the navbar top-left. The asset is committed under
  # docs/assets/ and referenced relative to docs_dir.
  logo: assets/honeyhive-ai-logo.png
  favicon: assets/favicon.png

  # Light/dark palette with a toggle button. Defaults follow the user's
  # system `prefers-color-scheme`. Primary = white (per HoneyHive brand
  # for the navbar in light mode; black mirrors that intent in dark
  # mode). Accent = `custom`, defined in stylesheets/extra.css.
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - navigation.sections           # group reference pages under a section
    - navigation.indexes            # makes section landing pages clickable
    - navigation.instant            # SPA-style page loads (no full reload)
    - navigation.top                # "back to top" button on long pages
    - toc.integrate                 # fold the page TOC into the left sidebar
    - search.suggest                # inline search suggestions as you type
    - search.highlight              # highlight search hits on the result page
    - search.share                  # "share this search" deep-link button
    - content.code.copy             # copy button on code blocks

# Custom CSS — defines the burnt-orange accent color referenced by
# `accent: custom` in the palette above.
extra_css:
  - stylesheets/extra.css

# Hide the "Made with Material for MkDocs" footer credit. Allowed by
# the project license; standard for branded customer-facing docs.
extra:
  generator: false

# Footer copyright line.
copyright: Copyright 2026 HoneyHive Inc

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
  - mkdocstrings:
      handlers:
        python:
          paths: [src]                # tells griffe where the package lives
          # External inventories let mkdocstrings turn references to types
          # defined outside this SDK into links to their upstream docs. With
          # this, `str`, `int`, `Optional`, etc. in signatures link to
          # docs.python.org instead of being rendered as plain hover-text.
          inventories:
            - https://docs.python.org/3/objects.inv
          options:
            docstring_style: google   # matches the SDK's existing docstrings
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            # Render attributes/fields even when they don't have their own
            # per-attribute docstring. Critical for the Pydantic models in
            # honeyhive._generated/models/ — those declare fields as typed
            # class attributes (`id: str = Field(...)`) without a trailing
            # docstring, so they're invisible in the rendered docs without
            # this flag.
            show_if_no_docstring: true
            # Make type annotations in signatures clickable links to the
            # corresponding symbol's reference page (e.g. `List[ConfigurationItem]`
            # → ConfigurationItem links to its model page). Requires the
            # mkdocs-autorefs plugin, which mkdocstrings pulls in transitively.
            # Note: this only works when the theme uses Pygments-only code
            # rendering (Material). Themes that re-highlight code blocks
            # client-side via highlight.js will strip the <a> tags.
            signature_crossrefs: true
            members_order: source     # preserve source-file order, not alphabetical
            # Filters are evaluated in order; "!" means exclude on match.
            # - `^_`             — hide private members and dunders
            # - `^model_config$` — hide the `model_config` ClassVar that
            #                      appears identically on every Pydantic
            #                      v2 model under honeyhive._generated;
            #                      pure boilerplate, not user-relevant.
            filters:
              - "!^_"
              - "!^model_config$"
